{% extends "layout.html" %}

{% block title %}Acesso Backoffice{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-lg-5">
        <div class="ls-card p-4">
            <h1 class="h4 ls-page-title mb-2">Backoffice Comercial</h1>
            <p class="text-muted">Módulo administrativo separado do menu principal. Informe sua chave de acesso para continuar.</p>

            <form method="POST" action="{{ url_for('admin_comercial.acesso') }}" class="mt-3">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label">Chave de acesso</label>
                    <input type="password" name="access_key" class="form-control ls-theme-control" required>
                </div>
                <button type="submit" class="btn ls-btn-primary w-100">Liberar Backoffice</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
