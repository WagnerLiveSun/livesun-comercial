{% extends "layout.html" %}

{% block title %}Nova Conciliação{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h1 class="display-6 fw-bold ls-page-title">Nova Conciliação</h1>
        <p class="text-muted mb-0">Parte 1: importar OFX e Parte 2: reconciliar automaticamente.</p>
    </div>
</div>

<div class="ls-card p-4">
    <form method="POST" enctype="multipart/form-data">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Conta Bancária</label>
                <select name="conta_banco_id" class="form-select" required>
                    <option value="">Selecione</option>
                    {% for conta in contas %}
                        <option value="{{ conta.id }}">{{ conta.nome }} - {{ conta.banco }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label">Arquivo OFX</label>
                <input type="file" name="arquivo" class="form-control" accept=".ofx,.txt,.qfx" required>
            </div>
            <div class="col-12">
                <button type="submit" class="btn ls-btn-primary">Processar Conciliação</button>
                <a href="{{ url_for('conciliacao.index') }}" class="btn btn-outline-secondary">Voltar</a>
            </div>
        </div>
    </form>
</div>
{% endblock %}
